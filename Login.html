<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpsTrack | Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/script.js" defer></script>
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">OpsTrack</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="metrics.html">Metrics</a></li>
        <li><a href="login.html" class="active">Login</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-main">
    <section class="page-header">
      <h1>Login</h1>
      <p>This front-end page represents future user access for business accounts.</p>
    </section>

    <section class="form-section">
      <form class="login-form" onsubmit="return validateLoginForm()">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />

        <button type="submit" class="btn">Login</button>
        <p id="loginMessage" class="form-message"></p>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 OpsTrack.</p>
  </footer>
</body>
</html>
